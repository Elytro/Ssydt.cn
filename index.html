<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>时事一点通</title>
    <link href="https://apps.bdimg.com/libs/bootstrap/3.3.4/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://apps.bdimg.com/libs/fontawesome/4.4.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            background: #fff;
            font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        .wrapper {
            display: table;
            width: 100%;
            height: 100%;
        }
        .main-content {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }
        .icon-wrap {
            margin-bottom: 30px;
        }
        .icon-wrap .fa {
            color: #bbb;
        }
        .title {
            font-size: 28px;
            font-weight: 300;
            color: #333;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .desc {
            font-size: 15px;
            color: #999;
            line-height: 1.8;
            margin-bottom: 0;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: #ddd;
            margin: 24px auto;
        }
        .footer-icp {
            position: absolute;
            bottom: 24px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #bbb;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        a:link, a:visited, a:hover, a:active {
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="main-content">
            <div class="container">
                <h1 class="title"> ssydt.cn </h1>
                <p class="desc">
                    网站正在维护，预计 07.18日 恢复访问
                </p>
                <div class="divider"></div>
                <p class="desc" style="font-size:13px;color:#bbb;">
                    We apologize for the inconvenience.<br>
                    The website is temporarily offline for maintenance.
                </p>
            </div>
        </div>
        <div class="footer-icp">
            <span><a href="//beian.miit.gov.cn">鲁ICP备2025189343号-10</a></span>
        </div>
    </div>
    <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
    <script src="https://apps.bdimg.com/libs/bootstrap/3.3.4/js/bootstrap.min.js"></script>
</body>
</html>
