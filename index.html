        }
        .form-check-input:focus {

        }
        .form-check-label {
            font-size: 0.82rem;

            user-select: none;
        }

            font-size: 0.82rem;

            transition: color 0.25s ease;
        }
        .forgot-link:hover {
            color: var(--text-primary);

        /* ---------- Button ---------- */

            width: 100%;
            background: #111;
            color: #fff;
            border: none;
            padding: 0.75rem;
            font-size: 0.92rem;
            border-radius: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            background: #2a2a2a;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            color: #fff;
        }
        .btn-login:active {
            transform: scale(0.985);
            background: #1a1a1a;
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .btn-login .spinner-border {
            border-width: 0.12em;
        }

        /* ---------- Divider ---------- */
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;

        .divider::before,
        .divider::after {
            content: '';

        }
        .site-footer .beian a:hover {

            opacity: 1;

        .site-footer .beian span {

                min-height: auto;
                border-radius: 14px;
            }
            .login-brand {
                display: none;
            }
            .login-form-panel {
                padding: 2.25rem 1.75rem;
            }
            .login-form-panel .panel-header .brand-mobile {

        @media (max-width: 400px) {

            }

            }

</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.title = '兰山区梦颖网络中心';

        $(function () {

            // 密码可见切换
            $('#togglePwd').on('click', function () {
                var pwd = $('#password');
                var icon = $(this).find('i');
                if (pwd.attr('type') === 'password') {
                    pwd.attr('type', 'text');
                    icon.removeClass('fa-eye').addClass('fa-eye-slash');
                } else {
                    pwd.attr('type', 'password');
                    icon.removeClass('fa-eye-slash').addClass('fa-eye');
                }
            });

            // 输入框聚焦时，聚焦图标也跟着变色（由 CSS :focus-within 处理）

            // 表单提交
            $('#loginForm').on('submit', function (e) {
                e.preventDefault();

                var username = $('#username').val().trim();
                var password = $('#password').val().trim();

                if (!username) {
                    showAlert('请输入账号');
                    $('#username').focus();
                    return;
                }
                if (!password) {
                    showAlert('请输入密码');
                    $('#password').focus();
                    return;
                }

                var btn = $('#loginBtn');
                btn.find('.btn-text').addClass('d-none');
                btn.find('.spinner-border').removeClass('d-none');
                btn.prop('disabled', true);
                $('#loginAlert').removeClass('show');

                // 模拟异步请求
                setTimeout(function () {
                    btn.find('.btn-text').removeClass('d-none');
                    btn.find('.spinner-border').addClass('d-none');
                    btn.prop('disabled', false);

                    if (username === 'admin' && password === 'admin123') {
                        window.location.href = 'index.html';
                    } else {
                        showAlert('账号或密码错误，请重试');
                    }
                }, 1200);
            });

            function showAlert(msg) {
                $('#alertMsg').text(msg);
                $('#loginAlert').addClass('show');
            }

            // 输入时隐藏错误提示
            $('#username, #password').on('input', function () {
                if ($('#loginAlert').hasClass('show')) {
                    $('#loginAlert').removeClass('show');
                }
            });

        });
    </script>
